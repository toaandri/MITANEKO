<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-pink-50 to-purple-50">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">
    <h1 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-pink-600 to-purple-600 mb-6 text-center">Connexion</h1>

    @if (error()) {
      <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">
        {{ error() }}
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input
          type="email"
          formControlName="email"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500"
          placeholder="vous@exemple.com"
        />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <p class="text-red-500 text-xs mt-1">Email invalide</p>
        }
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
        <input
          type="password"
          formControlName="password"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500"
          placeholder="••••••••"
        />
        @if (form.get('password')?.invalid && form.get('password')?.touched) {
          <p class="text-red-500 text-xs mt-1">Mot de passe requis</p>
        }
      </div>

      <button
        type="submit"
        [disabled]="loading()"
        class="w-full py-2 px-4 bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-700 hover:to-purple-700 disabled:opacity-50 text-white font-medium rounded-lg transition-all shadow-md active:scale-95 hover:scale-[1.02] hover:shadow-lg"
      >
        @if (loading()) {
          <span class="flex items-center justify-center gap-2">
            <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
            </svg>
            Connexion...
          </span>
        } @else {
          Se connecter
        }
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-gray-600">
      Pas encore de compte ?
      <a routerLink="/signup" class="text-pink-600 hover:text-purple-600 hover:underline font-medium transition-all hover:scale-105 inline-block">S'inscrire</a>
    </p>
  </div>
</div>
