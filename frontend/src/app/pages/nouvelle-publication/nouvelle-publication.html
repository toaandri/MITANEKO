<main class="pt-6 pb-16 px-4 max-w-2xl mx-auto">
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
    
    <!-- En-tête -->
    <div class="flex items-center justify-between pb-4 mb-6 border-b border-gray-100">
      <h1 class="text-xl font-bold text-gray-800">Nouvelle publication</h1>
      <a routerLink="/feed" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 hover:bg-gray-200 transition-colors">
        <ng-icon name="heroXMark" class="text-lg" />
      </a>
    </div>

    <!-- Message d'erreur -->
    <div *ngIf="errorMessage" class="mb-4 p-3 bg-red-50 text-red-600 rounded-xl text-sm border border-red-100">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="onSubmit()" class="space-y-6">

      <!-- Titre -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Titre de la publication *</label>
        <input 
          type="text" 
          [(ngModel)]="titre" 
          name="titre"
          placeholder="Ex: Signalement de dépôt sauvage, Objet perdu..."
          class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-500 focus:bg-white text-sm text-gray-800 transition-all placeholder-gray-400"
          required 
        />
      </div>

      <!-- Choix de la Catégorie -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Catégorie *</label>
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-2">
          <button 
            type="button"
            *ngFor="let cat of categories"
            (click)="categorie = cat.id"
            [ngClass]="categorie === cat.id 
              ? 'bg-pink-600 text-white border-pink-600 shadow-sm' 
              : 'bg-gray-50 text-gray-700 border-gray-200 hover:bg-gray-100'"
            class="flex items-center justify-center gap-2 p-3 rounded-xl border text-sm font-medium transition-all"
          >
            <ng-icon [name]="cat.icon" class="text-lg" />
            <span>{{ cat.label }}</span>
          </button>
        </div>
      </div>

      <!-- Contenu / Description -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Contenu / Détails *</label>
        <textarea 
          [(ngModel)]="contenu" 
          name="contenu"
          rows="4" 
          placeholder="Détaillez votre message ou signalement..."
          class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-500 focus:bg-white text-sm text-gray-800 resize-none transition-all placeholder-gray-400"
          required
        ></textarea>
      </div>

      <!-- Ajout d'une Photo -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Photo (optionnel)</label>
        <div *ngIf="!imagePreview" class="flex items-center justify-center w-full">
          <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-gray-200 border-dashed rounded-xl cursor-pointer bg-gray-50 hover:bg-gray-100 transition-all">
            <div class="flex flex-col items-center justify-center pt-5 pb-6">
              <ng-icon name="heroPhoto" class="text-2xl text-gray-400 mb-1" />
              <p class="text-xs text-gray-500">Cliquez pour ajouter une photo</p>
            </div>
            <input type="file" accept="image/*" class="hidden" (change)="onFileSelected($event)" />
          </label>
        </div>

        <div *ngIf="imagePreview" class="relative rounded-xl overflow-hidden border border-gray-200 max-h-48">
          <img [src]="imagePreview" alt="Aperçu" class="w-full object-cover max-h-48" />
          <button type="button" (click)="removePhoto()" class="absolute top-2 right-2 bg-gray-900/70 text-white rounded-full p-1 hover:bg-gray-900 transition-colors">
            <ng-icon name="heroXMark" class="text-lg" />
          </button>
        </div>
      </div>

      <!-- Adresse texte -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Adresse explicite (optionnel)</label>
        <input 
          type="text" 
          [(ngModel)]="adresse" 
          name="adresse"
          placeholder="Ex: Près de la pharmacie, rue 14..."
          class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-500 focus:bg-white text-sm text-gray-800 transition-all placeholder-gray-400"
        />
      </div>

      <!-- Carte Interactive Leaflet -->
      <div>
        <div class="flex items-center justify-between mb-1">
          <label class="text-sm font-semibold text-gray-700 flex items-center gap-1.5">
            <ng-icon name="heroMapPin" class="text-pink-600 text-lg" />
            Localisation sur la carte
          </label>
          <span *ngIf="selectedCoords" class="text-xs text-green-600 font-medium">
            ✓ Coordonnées enregistrées
          </span>
        </div>
        <p class="text-xs text-gray-500 mb-2">Cliquez sur la carte pour positionner le repère.</p>
        
        <div id="map" class="h-60 w-full rounded-xl border border-gray-200 overflow-hidden shadow-inner z-0"></div>
      </div>

      <!-- Bouton de Soumission -->
      <button 
        type="submit" 
        [disabled]="isSubmitting"
        class="w-full bg-gradient-to-r from-pink-500 to-purple-600 hover:opacity-95 text-white font-semibold py-3.5 px-6 rounded-xl shadow-md transition-all flex items-center justify-center gap-2 disabled:opacity-50"
      >
        <span>{{ isSubmitting ? 'Publication en cours...' : 'Publier maintenant' }}</span>
      </button>

    </form>
  </div>
</main>
