<main class="min-h-screen bg-[#f0f2f5] px-4 pt-6 pb-20">
  <div class="mx-auto max-w-3xl">
    <app-commune-nav />

    <a
      routerLink="/commune/groupes"
      class="mb-4 inline-flex items-center gap-2 text-sm font-semibold text-gray-600 hover:text-pink-600"
    >
      <ng-icon name="heroArrowLeft" />
      Retour aux groupes
    </a>

    <section class="mb-4 rounded-2xl border border-gray-100 bg-white p-5 shadow-sm">
      <div class="flex flex-wrap items-start justify-between gap-3">
        <div>
          <p class="text-sm font-semibold text-pink-600">Groupe modéré</p>
          <h1 class="text-2xl font-extrabold text-gray-900">{{ meta().nom }}</h1>
          <p class="mt-1 text-sm text-gray-500">{{ meta().description }}</p>
        </div>
        @if (meta().avecPolice) {
          <span class="inline-flex items-center gap-1 rounded-full bg-blue-100 px-3 py-1 text-xs font-semibold text-blue-700">
            <ng-icon name="heroShieldCheck" />
            Police présente
          </span>
        }
      </div>
      <div class="mt-3 flex flex-wrap gap-4 text-xs text-gray-500">
        <span class="inline-flex items-center gap-1">
          <ng-icon name="heroMapPin" />
          {{ meta().quartier }}
        </span>
        <span class="inline-flex items-center gap-1">
          <ng-icon name="heroUsers" />
          {{ meta().membres }} membres
        </span>
      </div>
    </section>

    <section class="rounded-2xl border border-gray-100 bg-white shadow-sm">
      <div class="border-b border-gray-100 px-5 py-3">
        <h2 class="text-sm font-bold text-gray-800">Discussion du groupe</h2>
      </div>

      <div class="max-h-[28rem] space-y-3 overflow-y-auto px-5 py-4">
        @for (msg of messages(); track msg.id) {
          <div class="rounded-xl bg-gray-50 p-3">
            <div class="mb-1 flex items-center justify-between gap-2">
              <span class="rounded-full px-2 py-0.5 text-xs font-semibold" [ngClass]="roleClass(msg.role)">
                {{ msg.auteur }}
              </span>
              <span class="text-xs text-gray-400">{{ msg.heure }}</span>
            </div>
            <p class="text-sm leading-6 text-gray-700">{{ msg.contenu }}</p>
          </div>
        }
      </div>

      <form class="flex gap-2 border-t border-gray-100 p-4" (ngSubmit)="envoyer()">
        <input
          type="text"
          [(ngModel)]="nouveauMessage"
          name="nouveauMessage"
          placeholder="Écrire un message (lieu, heure, présence…)"
          class="flex-1 rounded-xl border border-gray-200 bg-gray-50 px-3 py-2.5 text-sm outline-none focus:bg-white focus:ring-2 focus:ring-pink-500"
        />
        <button
          type="submit"
          class="inline-flex items-center gap-2 rounded-xl bg-pink-600 px-4 py-2.5 text-sm font-bold text-white hover:bg-pink-700"
        >
          <ng-icon name="heroPaperAirplane" />
          Envoyer
        </button>
      </form>
    </section>
  </div>
</main>
